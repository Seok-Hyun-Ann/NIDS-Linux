name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get install -y libpcap0.8

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Smoke-import (capture import is lazy; no root needed)
        run: python -c "import nad; from nad.cli import main; from nad.detect import BaselineDetector; from nad.features import WindowAggregator; from nad.storage import AlertStore; from nad.web.app import create_app; print('imports OK')"

      - name: List interfaces (libpcap binding smoke test)
        run: python -c "from nad.capture.linux_libpcap import list_devices; print(list_devices())"
